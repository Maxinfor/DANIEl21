        <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel21 - Jornada de Oração</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1547721064-da6cfb341d50?q=80&w=1920');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #app {
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.95);
            padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #d4af37;
        }
        .header-icon img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; margin-bottom: 15px; }
        h1 { color: #d4af37; }
        .card { background: #fdf6e3; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid #d4af37; }
        progress { width: 100%; height: 20px; }
        #btnAudio { background: #d4af37; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header-icon">
            <img src="https://cdn-icons-png.flaticon.com/512/3069/3069176.png" alt="Leão">
        </div>
        <h1>Daniel21</h1>
        <progress id="progresso-jornada" value="0" max="21"></progress>
        <div id="conteudo-dia"></div>
        <button onclick="toggleAudio()" id="btnAudio">▶ Tocar Som de Oração</button>
        <audio id="audioPlayer" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const jornadaDaniel = [
            { dia: 1, versiculo: "Daniel 1:8", texto: "Propósito: Decidir não se contaminar." },
            { dia: 2, versiculo: "Daniel 1:17", texto: "Capacitação: Deus dá sabedoria." },
            { dia: 3, versiculo: "Daniel 2:18", texto: "Unidade: Buscar a misericórdia." },
            { dia: 4, versiculo: "Daniel 2:20", texto: "Adoração: Reconhecer a soberania." },
            { dia: 5, versiculo: "Daniel 2:23", texto: "Gratidão: Agradecer a revelação." },
            { dia: 6, versiculo: "Daniel 3:17", texto: "Confiança: Deus livra da fornalha." },
            { dia: 7, versiculo: "Daniel 3:28", texto: "Testemunho: Fidelidade de Deus." },
            { dia: 8, versiculo: "Daniel 4:34", texto: "Humildade: Reconhecer o Altíssimo." },
            { dia: 9, versiculo: "Daniel 4:35", texto: "Submissão: Deus faz Sua vontade." },
            { dia: 10, versiculo: "Daniel 5:12", texto: "Excelência: Espírito superior." },
            { dia: 11, versiculo: "Daniel 6:10", texto: "Constância: Orar três vezes ao dia." },
            { dia: 12, versiculo: "Daniel 6:16", texto: "Fidelidade: Servir continuamente." },
            { dia: 13, versiculo: "Daniel 6:22", texto: "Proteção: Deus envia auxílio." },
            { dia: 14, versiculo: "Daniel 6:23", texto: "Esperança: Confiar em Deus." },
            { dia: 15, versiculo: "Daniel 9:3", texto: "Intensidade: Jejum e oração." },
            { dia: 16, versiculo: "Daniel 9:18", texto: "Dependência: Sua misericórdia." },
            { dia: 17, versiculo: "Daniel 9:19", texto: "Intercessão: Clamar pelo Seu amor." },
            { dia: 18, versiculo: "Daniel 10:12", texto: "Perseverança: Ouvidos desde o início." },
            { dia: 19, versiculo: "Daniel 10:19", texto: "Força: Deus nos fortalece." },
            { dia: 20, versiculo: "Daniel 12:3", texto: "Influência: Brilhar como o firmamento." },
            { dia: 21, versiculo: "Daniel 12:13", texto: "Descanso: Fiel até o fim." }
        ];

        function renderizarConteudo() {
            const dia = 1; // Você pode ajustar para ser dinâmico depois
            const c = jornadaDaniel[dia-1];
            document.getElementById('conteudo-dia').innerHTML = `
                <div class="card">
                    <h2>Dia ${c.dia}</h2>
                    <p><strong>${c.versiculo}</strong></p>
                    <p>${c.texto}</p>
                </div>`;
            document.getElementById('progresso-jornada').value = dia;
        }

        function toggleAudio() {
            const a = document.getElementById("audioPlayer");
            const b = document.getElementById("btnAudio");
            a.paused ? a.play() : a.pause();
            b.innerText = a.paused ? "▶ Tocar Som de Oração" : "⏸ Pausar Som";
        }

        window.onload = renderizarConteudo;
    </script>

    <!--End of Tawk.to Script-->

</body>
</html>
