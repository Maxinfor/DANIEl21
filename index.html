<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel21 - Jornada de Oração</title>
    <style>
        body {
            margin: 0; padding: 20px; 
            font-family: 'Georgia', serif;
            background-color: #f4f4f9;
            display: flex; justify-content: center; min-height: 100vh;
        }
        #app {
            width: 100%; max-width: 500px; background: #ffffff;
            padding: 30px; border-radius: 12px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header-icon { font-size: 50px; margin-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 28px; margin-bottom: 20px; }
        .card { 
            background: #ffffff; padding: 20px; border-radius: 8px; 
            margin-top: 20px; border: 1px solid #ddd; text-align: left;
        }
        .card h2 { color: #d4af37; margin-top: 0; }
        progress { width: 100%; height: 10px; accent-color: #d4af37; margin-top: 10px; }
        #btnAudio { 
            background: #2c3e50; color: white; border: none; 
            padding: 12px 25px; border-radius: 6px; cursor: pointer; 
            margin-top: 25px; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header-icon">📖</div>
        <h1>Daniel21</h1>
        <progress id="progresso-jornada" value="1" max="21"></progress>
        <div id="conteudo-dia"></div>
        <button onclick="toggleAudio()" id="btnAudio">▶ Tocar Som de Oração</button>
        <audio id="audioPlayer" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Data de início fixada em 23/06/2026
        const dataInicio = new Date('2026-06-23T00:00:00'); 

        const jornadaDaniel = [
            { dia: 1, versiculo: "Daniel 1:8", texto: "Propósito: Decidir no coração não se contaminar." },
            { dia: 2, versiculo: "Daniel 1:17", texto: "Capacitação: Deus dá sabedoria e entendimento." },
            { dia: 3, versiculo: "Daniel 2:18", texto: "Unidade: Buscar a misericórdia de Deus em comunhão." },
            { dia: 4, versiculo: "Daniel 2:20", texto: "Adoração: Bendito seja o nome de Deus para todo o sempre." },
            { dia: 5, versiculo: "Daniel 2:23", texto: "Gratidão: Agradecer a Deus pela revelação e sabedoria." },
            { dia: 6, versiculo: "Daniel 3:17", texto: "Confiança: Deus é poderoso para nos livrar." },
            { dia: 7, versiculo: "Daniel 3:28", texto: "Testemunho: O livramento de Deus e a nossa fidelidade." },
            { dia: 8, versiculo: "Daniel 4:34", texto: "Humildade: Reconhecer a Deus como o Altíssimo." },
            { dia: 9, versiculo: "Daniel 4:35", texto: "Submissão: Deus faz segundo a Sua vontade no céu e na terra." },
            { dia: 10, versiculo: "Daniel 5:12", texto: "Excelência: Buscar um espírito superior e conhecimento." },
            { dia: 11, versiculo: "Daniel 6:10", texto: "Constância: Orar com fidelidade, independentemente das circunstâncias." },
            { dia: 12, versiculo: "Daniel 6:16", texto: "Fidelidade: Servir a Deus continuamente." },
            { dia: 13, versiculo: "Daniel 6:22", texto: "Proteção: Deus envia o Seu auxílio em momentos de aflição." },
            { dia: 14, versiculo: "Daniel 6:23", texto: "Esperança: Confiar que nada mal sucederá aos que confiam em Deus." },
            { dia: 15, versiculo: "Daniel 9:3", texto: "Intensidade: Buscar a Deus com jejum, oração e súplicas." },
            { dia: 16, versiculo: "Daniel 9:18", texto: "Dependência: Apoiar-se na grande misericórdia de Deus." },
            { dia: 17, versiculo: "Daniel 9:19", texto: "Intercessão: Clamar pelo amor e misericórdia de Deus." },
            { dia: 18, versiculo: "Daniel 10:12", texto: "Perseverança: As palavras de oração são ouvidas desde o primeiro dia." },
            { dia: 19, versiculo: "Daniel 10:19", texto: "Força: Deus nos fortalece com Sua palavra e presença." },
            { dia: 20, versiculo: "Daniel 12:3", texto: "Influência: Brilhar como o firmamento e conduzir muitos à justiça." },
            { dia: 21, versiculo: "Daniel 12:13", texto: "Descanso: Fiel até o fim da jornada." }
        ];

        function renderizarConteudo() {
            const hoje = new Date();
            const diferencaTempo = hoje - dataInicio;
            const diaAtual = Math.floor(diferencaTempo / (1000 * 60 * 60 * 24)) + 1;
            const diaExibido = Math.min(Math.max(diaAtual, 1), 21);
            
            const c = jornadaDaniel[diaExibido - 1];
            
            document.getElementById('conteudo-dia').innerHTML = `
                <div class="card">
                    <p style="text-align:center; color:#d4af37; font-weight:bold;">Dia ${diaExibido} de 21</p>
                    <h2 style="font-size: 1.2em; margin: 10px 0;">${c.versiculo}</h2>
                    <p>${c.texto}</p>
                </div>`;
            document.getElementById('progresso-jornada').value = diaExibido;
        }

        function toggleAudio() {
            const a = document.getElementById("audioPlayer");
            const b = document.getElementById("btnAudio");
            if (a.paused) {
                a.play();
                b.innerText = "⏸ Pausar Som";
            } else {
                a.pause();
                b.innerText = "▶ Tocar Som de Oração";
            }
        }

        window.onload = renderizarConteudo;
    </script>

    s1.charset='UTF-8';

    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
